<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="50%" style="stop-color:#0f0f12"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a7a9e"/>
      <stop offset="100%" style="stop-color:#7a96b5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <circle cx="100" cy="530" r="200" fill="#5a7a9e" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1100" cy="100" r="250" fill="#7a96b5" opacity="0.06" filter="url(#glow)"/>
  <circle cx="600" cy="600" r="300" fill="#5a7a9e" opacity="0.04" filter="url(#glow)"/>
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <g transform="translate(600, 250)">
    <image href="logo-2.png" x="-50" y="-130" width="100" height="100" preserveAspectRatio="xMidYMid meet"/>
    
    <text y="30" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fafafa" text-anchor="middle">PortlifyAi</text>
    
    <text y="90" font-family="Arial, sans-serif" font-size="28" fill="#a1a1aa" text-anchor="middle">AI-Powered Resume to Portfolio Builder</text>
  </g>
  
  <g transform="translate(600, 420)">
    <rect x="-380" y="0" width="160" height="44" rx="22" fill="white" fill-opacity="0.06"/>
    <text x="-300" y="28" font-family="Arial, sans-serif" font-size="16" fill="#fafafa" text-anchor="middle">✨ AI Parsing</text>
    
    <rect x="-100" y="0" width="200" height="44" rx="22" fill="white" fill-opacity="0.06"/>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="16" fill="#fafafa" text-anchor="middle">⚡ Instant Portfolio</text>
    
    <rect x="220" y="0" width="160" height="44" rx="22" fill="white" fill-opacity="0.06"/>
    <text x="300" y="28" font-family="Arial, sans-serif" font-size="16" fill="#fafafa" text-anchor="middle">📊 Analytics</text>
  </g>
  
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="22" fill="url(#accent)" text-anchor="middle">portlifyai.app</text>
  
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="16" fill="#71717a" text-anchor="middle">Transform your resume into a stunning portfolio in seconds</text>
</svg>